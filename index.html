<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VayTiền">
<meta name="theme-color" content="#7c6cfa">
<title>Quản Lý Vay Tiền</title>
<style>
:root {
  --bg:#0f0f13;--surface:#18181f;--surface2:#22222c;--border:#2e2e3a;
  --accent:#7c6cfa;--green:#4eca8b;--amber:#f5a623;--red:#fa4d4d;
  --text:#f0f0f5;--text2:#9898b0;--text3:#5a5a72;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:17px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--safe-bottom) + 90px);}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:transparent;color:var(--text3);font-size:10px;cursor:pointer;}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}
.panel{display:none;}.panel.active{display:block;}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.sum-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.sum-value{font-size:20px;font-weight:700;}
.col-p{color:var(--accent)}.col-g{color:var(--green)}.col-r{color:var(--red)}.col-a{color:var(--amber)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;font-family:inherit;}
.field textarea{resize:none;line-height:1.5;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.chip-label{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.chip-val{font-weight:700;font-size:16px;}
.warn{padding:10px 14px;border-radius:10px;font-size:13px;margin-top:12px;font-weight:500;display:none;border-left:3px solid;}
.warn.show{display:block;}
.warn.g{background:rgba(78,202,139,0.1);border-color:var(--green);color:var(--green);}
.warn.a{background:rgba(245,166,35,0.1);border-color:var(--amber);color:var(--amber);}
.warn.r{background:rgba(250,77,77,0.1);border-color:var(--red);color:var(--red);}
.btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn:active{opacity:0.85;}
.btn-green{background:var(--green);}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.list-item:active{border-color:var(--accent);}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.av-g{background:rgba(78,202,139,0.15);color:var(--green);}
.av-p{background:rgba(124,108,250,0.15);color:var(--accent);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.badge{display:inline-block;font-size:11px;padding:4px 10px;border-radius:100px;font-weight:600;border:none;cursor:pointer;font-family:inherit;}
.badge-g{background:rgba(78,202,139,0.15);color:var(--green);}
.badge-r{background:rgba(250,77,77,0.15);color:var(--red);}
.badge-a{background:rgba(245,166,35,0.15);color:var(--amber);}
.badge-p{background:rgba(124,108,250,0.15);color:var(--accent);}
.badge-gray{background:rgba(152,152,176,0.15);color:var(--text2);}
.section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:4px;}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.detail-page{display:none;position:absolute;inset:0;background:var(--bg);z-index:200;flex-direction:column;}
.detail-page.open{display:flex;}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 50px;}
.detail-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.back-btn{background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;padding:4px 8px;border-radius:8px;}
.detail-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.detail-avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.detail-name{font-size:20px;font-weight:700;}
.detail-type{font-size:13px;color:var(--text3);margin-top:2px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;}
.info-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.info-value{font-size:16px;font-weight:700;}
.progress-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;border-radius:4px;background:var(--green);transition:width 0.4s;}
.note-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.note-text{font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.note-empty{font-size:13px;color:var(--text3);}
.add-pay{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.add-pay-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.pay-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.pay-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;width:100%;font-family:inherit;}
.pay-input:focus{border-color:var(--accent);}
.btn-pay{padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;}
.pay-section{margin-bottom:14px;}
.pay-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.pay-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.pay-date{font-size:13px;font-weight:600;}
.pay-note-text{font-size:12px;color:var(--text3);margin-top:2px;}
.pay-amount{font-size:15px;font-weight:700;color:var(--green);}
.pay-del{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 8px;border-radius:6px;margin-left:8px;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.btn-del{width:100%;padding:13px;background:rgba(250,77,77,0.1);color:var(--red);border:1px solid rgba(250,77,77,0.3);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;}

/* LOGIN & LOOKUP */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px 24px;}
.login-logo{font-size:48px;margin-bottom:16px;}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;color:var(--text);}
.login-sub{font-size:14px;color:var(--text3);margin-bottom:32px;text-align:center;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:360px;}
.login-tab{display:flex;gap:8px;margin-bottom:20px;}
.ltab{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;}
.ltab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.loading{text-align:center;padding:20px;color:var(--text3);font-size:14px;}
.toast{position:fixed;bottom:calc(var(--safe-bottom) + 100px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:opacity 0.3s;white-space:nowrap;}
.toast.show{opacity:1;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="height:100%;display:flex;flex-direction:column;">
  <div class="login-wrap">
    <div class="login-logo">💰</div>
    <div class="login-title">VayTiền</div>
    <div class="login-sub">Quản lý vay & cho vay dễ dàng</div>
    <div class="login-card">
      <div class="login-tab">
        <button class="ltab active" onclick="setLoginTab('admin',this)">Admin</button>
        <button class="ltab" onclick="setLoginTab('lookup',this)">Tra cứu</button>
      </div>
      <!-- ADMIN LOGIN -->
      <div id="admin-login">
        <div class="field"><label>Mật khẩu admin</label><input type="password" id="admin-pass" placeholder="Nhập mật khẩu..." onkeydown="if(event.key==='Enter')adminLogin()"></div>
        <button class="btn" onclick="adminLogin()">Đăng nhập</button>
      </div>
      <!-- USER LOOKUP -->
      <div id="user-lookup" style="display:none;">
        <div class="field"><label>Tên hoặc số điện thoại</label><input type="text" id="lookup-query" placeholder="Nguyễn Văn A / 0901..." onkeydown="if(event.key==='Enter')lookupUser()"></div>
        <button class="btn btn-green" onclick="lookupUser()">Tra cứu</button>
        <div id="lookup-result" style="margin-top:16px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP (admin only) -->
<div id="main-app" class="app" style="display:none;">
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>VayTiền <div class="sync-dot" id="sync-dot"></div></div>
    <button style="background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;" onclick="adminLogout()">Đăng xuất</button>
  </div>
  <div class="scroll">
    <div class="panel active" id="tab-calc">
      <div class="summary" id="overview"></div>
      <div class="card">
        <div class="card-title">Tính lãi nhanh</div>
        <div class="field-row">
          <div class="field"><label>Tiền vay (triệu)</label><input type="number" id="c-p" value="50" min="1" inputmode="decimal"></div>
          <div class="field"><label>Lãi phải trả (triệu)</label><input type="number" id="c-i" value="12" min="0" inputmode="decimal"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Thời hạn</label><input type="number" id="c-m" value="2" min="1" inputmode="numeric"></div>
          <div class="field"><label>Đơn vị</label><select id="c-u"><option value="month">Tháng</option><option value="day">Ngày</option></select></div>
        </div>
        <div class="chips" id="c-chips"></div>
        <div class="warn" id="c-warn"></div>
      </div>
    </div>
    <div class="panel" id="tab-borrowers">
      <div class="card">
        <div class="card-title">Thêm người vay</div>
        <div class="field"><label>Họ và tên</label><input type="text" id="b-name" placeholder="Nguyễn Văn A"></div>
        <div class="field"><label>Số điện thoại</label><input type="tel" id="b-phone" placeholder="0901234567" inputmode="tel"></div>
        <div class="field-row">
          <div class="field"><label>Tiền vay (triệu)</label><input type="number" id="b-p" value="30" min="1" inputmode="decimal"></div>
          <div class="field"><label>Lãi/tháng (triệu)</label><input type="number" id="b-i" value="3" min="0" inputmode="decimal"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Thời hạn (tháng)</label><input type="number" id="b-m" value="1" min="1" inputmode="numeric"></div>
          <div class="field"><label>Ngày bắt đầu</label><input type="date" id="b-date"></div>
        </div>
        <div class="field"><label>Ghi chú</label><textarea id="b-note" rows="3" placeholder="CCCD, tài sản thế chấp, mục đích vay..."></textarea></div>
        <button class="btn" onclick="addBorrower()">+ Thêm người vay</button>
      </div>
      <div class="section-label">Danh sách người vay</div>
      <div id="b-list"></div>
    </div>
    <div class="panel" id="tab-lenders">
      <div class="card">
        <div class="card-title">Thêm người cho vay</div>
        <div class="field"><label>Họ và tên</label><input type="text" id="l-name" placeholder="Trần Thị B"></div>
        <div class="field"><label>Số điện thoại</label><input type="tel" id="l-phone" placeholder="0901234567" inputmode="tel"></div>
        <div class="field-row">
          <div class="field"><label>Tiền cho vay (triệu)</label><input type="number" id="l-p" value="50" min="1" inputmode="decimal"></div>
          <div class="field"><label>Lãi/tháng (triệu)</label><input type="number" id="l-i" value="6" min="0" inputmode="decimal"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Thời hạn (tháng)</label><input type="number" id="l-m" value="2" min="1" inputmode="numeric"></div>
          <div class="field"><label>Ngày bắt đầu</label><input type="date" id="l-date"></div>
        </div>
        <div class="field"><label>Ghi chú</label><textarea id="l-note" rows="3" placeholder="Điều kiện cho vay, thông tin liên lạc..."></textarea></div>
        <button class="btn" onclick="addLender()">+ Thêm người cho vay</button>
      </div>
      <div class="section-label">Danh sách người cho vay</div>
      <div id="l-list"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('calc',this)"><span class="nav-icon">🧮</span>Tính lãi</button>
    <button class="nav-item" onclick="switchTab('borrowers',this)"><span class="nav-icon">👤</span>Người vay</button>
    <button class="nav-item" onclick="switchTab('lenders',this)"><span class="nav-icon">💰</span>Cho vay</button>
  </nav>
</div>

<!-- DETAIL PAGE -->
<div class="detail-page" id="detail-page">
  <div class="detail-topbar">
    <button class="back-btn" onclick="closeDetail()">← Quay lại</button>
    <div style="font-size:13px;color:var(--text3);" id="detail-tab-label"></div>
    <div style="width:70px;"></div>
  </div>
  <div class="detail-scroll">
    <div class="detail-header">
      <div class="detail-avatar" id="d-avatar"></div>
      <div><div class="detail-name" id="d-name"></div><div class="detail-type" id="d-type"></div></div>
    </div>
    <div class="info-grid" id="d-info"></div>
    <div class="card">
      <div class="card-title">Tiến độ thanh toán</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:13px;color:var(--text2);">Đã trả</span>
        <span style="font-size:14px;font-weight:700;" id="d-paid-text"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="d-progress-fill"></div></div>
      <div style="display:flex;justify-content:space-between;">
        <span style="font-size:12px;color:var(--text3);" id="d-remaining"></span>
        <span style="font-size:12px;color:var(--text3);" id="d-total-label"></span>
      </div>
    </div>
    <div class="note-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;">Ghi chú</span>
        <button style="background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;" onclick="toggleEditNote()">Sửa</button>
      </div>
      <div id="d-note-content"></div>
      <div id="d-note-edit" style="display:none;margin-top:10px;">
        <textarea class="pay-input" id="d-note-input" rows="5" style="border-radius:10px;padding:12px;margin-bottom:8px;width:100%;"></textarea>
        <button class="btn-pay" onclick="saveNote()">Lưu ghi chú</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="add-pay">
      <div class="add-pay-title">Ghi nhận thanh toán</div>
      <div class="pay-row">
        <input class="pay-input" type="number" id="pay-amount" placeholder="Số tiền (triệu)" inputmode="decimal">
        <input class="pay-input" type="date" id="pay-date">
      </div>
      <input class="pay-input" type="text" id="pay-note" placeholder="Ghi chú: tháng mấy, hình thức..." style="margin-bottom:8px;">
      <button class="btn-pay" onclick="addPayment()">+ Ghi nhận thanh toán</button>
    </div>
    <div class="pay-section">
      <div class="pay-title">Lịch sử thanh toán</div>
      <div id="d-payments"></div>
    </div>
    <div class="divider"></div>
    <button class="btn-del" id="d-del-btn">Xoá người này</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// ====== CẤU HÌNH FIREBASE ======
const firebaseConfig = {
  apiKey: "AIzaSyDXOaNHcURJ7_hc5akzEZvf0hUow6BS6Go",
  authDomain: "vaytienapp-4c114.firebaseapp.com",
  projectId: "vaytienapp-4c114",
  storageBucket: "vaytienapp-4c114.firebasestorage.app",
  messagingSenderId: "1023899785183",
  appId: "1:1023899785183:web:3c162d18a206b86d8a966a"
};

// ====== MẬT KHẨU ADMIN ======
const ADMIN_PASSWORD = "toan2002";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let borrowers = [];
let lenders = [];
let curId = null, curType = null;
let isAdmin = false;
let unsubBorrowers = null, unsubLenders = null;

// ====== UTILS ======
function fmt(n){return parseFloat(n.toFixed(2));}
function pct(n){return fmt(n)+'%';}
function initials(n){return n.trim().split(' ').filter(Boolean).slice(-2).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';}
function rateInfo(r){
  if(r<=1.5)return{cls:'g',label:'Bình thường',msg:'Lãi suất hợp lý.'};
  if(r<=5)return{cls:'a',label:'Lãi cao',msg:'Cao hơn ngân hàng nhiều. Cân nhắc!'};
  return{cls:'r',label:'Tín dụng đen!',msg:'Nguy hiểm! Lãi/năm vượt 60%!'};
}
function sCls(s){return{'Đã trả':'g','Trễ hạn':'r','Đang trả':'a','Chưa trả':'gray','Đã thu hồi':'g','Quá hạn':'r','Đang nợ':'p'}[s]||'gray';}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function setSyncing(v){
  const d=document.getElementById('sync-dot');
  if(d)d.className='sync-dot'+(v?' syncing':'');
}

// ====== LOGIN ======
window.setLoginTab = function(tab, btn) {
  document.querySelectorAll('.ltab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('admin-login').style.display = tab==='admin'?'block':'none';
  document.getElementById('user-lookup').style.display = tab==='lookup'?'block':'none';
  document.getElementById('lookup-result').innerHTML='';
}

window.adminLogin = function() {
  const pass = document.getElementById('admin-pass').value;
  if(pass === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='flex';
    startListening();
    calcLite();
    const today=new Date().toISOString().split('T')[0];
    document.getElementById('b-date').value=today;
    document.getElementById('l-date').value=today;
  } else {
    showToast('❌ Sai mật khẩu!');
  }
}

window.adminLogout = function() {
  if(unsubBorrowers) unsubBorrowers();
  if(unsubLenders) unsubLenders();
  isAdmin=false;
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('admin-pass').value='';
}

// ====== TRA CỨU (user) ======
window.lookupUser = async function() {
  const q = document.getElementById('lookup-query').value.trim().toLowerCase();
  const el = document.getElementById('lookup-result');
  if(!q){showToast('Nhập tên hoặc SĐT!');return;}
  el.innerHTML='<div class="loading">Đang tìm...</div>';
  try {
    const results = [];
    const bSnap = await getDocs(collection(db,'borrowers'));
    bSnap.forEach(d=>{
      const data=d.data();
      if(data.name?.toLowerCase().includes(q)||data.phone?.includes(q)){
        results.push({...data,id:d.id,type:'borrower'});
      }
    });
    const lSnap = await getDocs(collection(db,'lenders'));
    lSnap.forEach(d=>{
      const data=d.data();
      if(data.name?.toLowerCase().includes(q)||data.phone?.includes(q)){
        results.push({...data,id:d.id,type:'lender'});
      }
    });
    if(!results.length){el.innerHTML='<div style="text-align:center;color:var(--text3);font-size:14px;padding:20px 0;">Không tìm thấy</div>';return;}
    el.innerHTML = results.map(r=>{
      const paid=(r.payments||[]).reduce((s,p)=>s+p.amount,0);
      const total=r.i*r.m;
      const remaining=Math.max(0,total-paid);
      const ri=rateInfo(r.mRate||0);
      return `<div class="list-item" style="cursor:default;margin-bottom:10px;">
        <div class="avatar ${r.type==='borrower'?'av-g':'av-p'}">${initials(r.name)}</div>
        <div class="item-info">
          <div class="item-name">${r.name}</div>
          <div class="item-sub">${r.type==='borrower'?'Người vay':'Người cho vay'} · ${fmt(r.p)}tr · ${r.m} tháng</div>
          <div class="item-sub" style="margin-top:4px;">Đã trả: ${fmt(paid)}tr · Còn lại: <span style="color:var(--red);font-weight:600;">${fmt(remaining)}tr</span></div>
          ${r.date?`<div class="item-sub">Bắt đầu: ${r.date}</div>`:''}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML='<div style="color:var(--red);font-size:13px;">Lỗi kết nối. Thử lại!</div>';
  }
}

// ====== REALTIME LISTENER ======
function startListening() {
  unsubBorrowers = onSnapshot(collection(db,'borrowers'), snap=>{
    borrowers=[];
    snap.forEach(d=>borrowers.push({...d.data(),id:d.id}));
    renderBorrowers();updateOverview();
  });
  unsubLenders = onSnapshot(collection(db,'lenders'), snap=>{
    lenders=[];
    snap.forEach(d=>lenders.push({...d.data(),id:d.id}));
    renderLenders();updateOverview();
  });
}

// ====== CALC ======
function calcLite(){
  const p=parseFloat(document.getElementById('c-p').value)||0;
  const i=parseFloat(document.getElementById('c-i').value)||0;
  const m=parseFloat(document.getElementById('c-m').value)||1;
  const u=document.getElementById('c-u').value;
  const months=u==='day'?m/30:m;
  if(p<=0)return;
  const mRate=(i/p/months)*100,yRate=mRate*12,total=p+i,bank=p*0.01*months;
  const info=rateInfo(mRate);
  document.getElementById('c-chips').innerHTML=`
    <div class="chip"><div class="chip-label">Lãi / tháng</div><div class="chip-val col-${info.cls}">${pct(mRate)}</div></div>
    <div class="chip"><div class="chip-label">Lãi / năm</div><div class="chip-val col-${info.cls}">${pct(yRate)}</div></div>
    <div class="chip"><div class="chip-label">Tổng phải trả</div><div class="chip-val">${fmt(total)} tr</div></div>
    <div class="chip"><div class="chip-label">Cao hơn NH</div><div class="chip-val col-${info.cls}">${fmt(i/bank)}x</div></div>`;
  const w=document.getElementById('c-warn');
  w.className='warn show '+info.cls;w.textContent=info.msg;
  updateOverview();
}

function updateOverview(){
  const tb=borrowers.reduce((s,x)=>s+x.p,0);
  const tl=lenders.reduce((s,x)=>s+x.p,0);
  const ib=borrowers.reduce((s,x)=>s+(x.payments||[]).reduce((s2,p)=>s2+p.amount,0),0);
  const il=lenders.reduce((s,x)=>s+(x.payments||[]).reduce((s2,p)=>s2+p.amount,0),0);
  const el=document.getElementById('overview');
  if(el)el.innerHTML=`
    <div class="sum-card"><div class="sum-label">Tổng vay</div><div class="sum-value col-p">${fmt(tb)}tr</div></div>
    <div class="sum-card"><div class="sum-label">Tổng cho vay</div><div class="sum-value col-a">${fmt(tl)}tr</div></div>
    <div class="sum-card"><div class="sum-label">Lãi đã thu</div><div class="sum-value col-g">${fmt(ib)}tr</div></div>
    <div class="sum-card"><div class="sum-label">Lãi đã trả</div><div class="sum-value col-r">${fmt(il)}tr</div></div>`;
}

// ====== ADD ======
window.addBorrower = async function(){
  const name=document.getElementById('b-name').value.trim();
  if(!name){showToast('Nhập tên!');return;}
  const p=parseFloat(document.getElementById('b-p').value)||0;
  const i=parseFloat(document.getElementById('b-i').value)||0;
  const m=parseInt(document.getElementById('b-m').value)||1;
  const phone=document.getElementById('b-phone').value.trim();
  const date=document.getElementById('b-date').value;
  const note=document.getElementById('b-note').value.trim();
  const mRate=p>0?(i/p)*100:0;
  setSyncing(true);
  try{
    await addDoc(collection(db,'borrowers'),{name,phone,p,i,m,date,note,mRate,status:'Chưa trả',payments:[],createdAt:Date.now()});
    document.getElementById('b-name').value='';document.getElementById('b-note').value='';document.getElementById('b-phone').value='';
    showToast('✓ Đã thêm người vay');
  }catch(e){showToast('❌ Lỗi kết nối!');}
  setSyncing(false);
}

window.addLender = async function(){
  const name=document.getElementById('l-name').value.trim();
  if(!name){showToast('Nhập tên!');return;}
  const p=parseFloat(document.getElementById('l-p').value)||0;
  const i=parseFloat(document.getElementById('l-i').value)||0;
  const m=parseInt(document.getElementById('l-m').value)||1;
  const phone=document.getElementById('l-phone').value.trim();
  const date=document.getElementById('l-date').value;
  const note=document.getElementById('l-note').value.trim();
  const mRate=p>0?(i/p)*100:0;
  setSyncing(true);
  try{
    await addDoc(collection(db,'lenders'),{name,phone,p,i,m,date,note,mRate,status:'Đang nợ',payments:[],createdAt:Date.now()});
    document.getElementById('l-name').value='';document.getElementById('l-note').value='';document.getElementById('l-phone').value='';
    showToast('✓ Đã thêm người cho vay');
  }catch(e){showToast('❌ Lỗi kết nối!');}
  setSyncing(false);
}

// ====== RENDER ======
function renderBorrowers(){
  const el=document.getElementById('b-list');
  if(!el)return;
  if(!borrowers.length){el.innerHTML='<div class="empty"><div class="empty-icon">👤</div>Chưa có người vay nào</div>';return;}
  el.innerHTML=borrowers.map(b=>{
    const ri=rateInfo(b.mRate||0);
    const paid=(b.payments||[]).reduce((s,p)=>s+p.amount,0);
    const total=b.i*b.m;
    return `<div class="list-item" onclick="openDetail('${b.id}','borrower')">
      <div class="avatar av-g">${initials(b.name)}</div>
      <div class="item-info">
        <div class="item-name">${b.name}</div>
        <div class="item-sub">${b.phone?b.phone+' · ':''}${fmt(b.p)}tr · ${b.m}th · đã trả ${fmt(paid)}/${fmt(total)}tr</div>
      </div>
      <div class="item-right">
        <span class="badge badge-${ri.cls}" style="font-size:11px;padding:3px 8px;">${pct(b.mRate||0)}/th</span>
        <span class="badge badge-${sCls(b.status)}">${b.status}</span>
      </div>
    </div>`;
  }).join('');
}

function renderLenders(){
  const el=document.getElementById('l-list');
  if(!el)return;
  if(!lenders.length){el.innerHTML='<div class="empty"><div class="empty-icon">💰</div>Chưa có người cho vay nào</div>';return;}
  el.innerHTML=lenders.map(l=>{
    const ri=rateInfo(l.mRate||0);
    const paid=(l.payments||[]).reduce((s,p)=>s+p.amount,0);
    const total=l.i*l.m;
    return `<div class="list-item" onclick="openDetail('${l.id}','lender')">
      <div class="avatar av-p">${initials(l.name)}</div>
      <div class="item-info">
        <div class="item-name">${l.name}</div>
        <div class="item-sub">${l.phone?l.phone+' · ':''}${fmt(l.p)}tr · ${l.m}th · đã trả ${fmt(paid)}/${fmt(total)}tr</div>
      </div>
      <div class="item-right">
        <span class="badge badge-${ri.cls}" style="font-size:11px;padding:3px 8px;">${pct(l.mRate||0)}/th</span>
        <span class="badge badge-${sCls(l.status)}">${l.status}</span>
      </div>
    </div>`;
  }).join('');
}

// ====== DETAIL ======
window.openDetail = function(id, type){
  const arr=type==='borrower'?borrowers:lenders;
  const item=arr.find(x=>x.id===id);
  if(!item)return;
  curId=id;curType=type;
  document.getElementById('detail-tab-label').textContent=type==='borrower'?'Người vay':'Người cho vay';
  const av=document.getElementById('d-avatar');
  av.textContent=initials(item.name);av.className='detail-avatar '+(type==='borrower'?'av-g':'av-p');
  document.getElementById('d-name').textContent=item.name;
  document.getElementById('d-type').textContent=(item.phone?'📱 '+item.phone+' · ':'')+(type==='borrower'?'Người vay':'Người cho vay');
  const ri=rateInfo(item.mRate||0);
  document.getElementById('d-info').innerHTML=`
    <div class="info-card"><div class="info-label">Số tiền</div><div class="info-value col-p">${fmt(item.p)}tr</div></div>
    <div class="info-card"><div class="info-label">Lãi/tháng</div><div class="info-value col-a">${fmt(item.i)}tr</div></div>
    <div class="info-card"><div class="info-label">Thời hạn</div><div class="info-value">${item.m} tháng</div></div>
    <div class="info-card"><div class="info-label">Tổng lãi</div><div class="info-value col-r">${fmt(item.i*item.m)}tr</div></div>
    <div class="info-card"><div class="info-label">Lãi%/tháng</div><div class="info-value col-${ri.cls}">${pct(item.mRate||0)}</div></div>
    <div class="info-card"><div class="info-label">Ngày bắt đầu</div><div class="info-value" style="font-size:13px;">${item.date||'—'}</div></div>`;
  renderDetailProgress(item);
  renderDetailNote(item);
  renderDetailPayments(item);
  document.getElementById('pay-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('pay-amount').value='';
  document.getElementById('pay-note').value='';
  document.getElementById('d-del-btn').onclick=()=>deletePerson(id,type);
  document.getElementById('detail-page').classList.add('open');
  document.querySelector('.detail-scroll').scrollTop=0;
}

function renderDetailProgress(item){
  const paid=(item.payments||[]).reduce((s,p)=>s+p.amount,0);
  const total=item.i*item.m;
  const p2=total>0?Math.min(100,(paid/total)*100):0;
  const rem=Math.max(0,total-paid);
  document.getElementById('d-paid-text').textContent=`${fmt(paid)} / ${fmt(total)} triệu`;
  document.getElementById('d-paid-text').style.color=paid>=total?'var(--green)':'var(--text)';
  document.getElementById('d-progress-fill').style.width=p2+'%';
  document.getElementById('d-remaining').textContent=rem>0?`Còn lại: ${fmt(rem)}tr`:'✓ Đã trả đủ';
  document.getElementById('d-total-label').textContent=`Tổng lãi: ${fmt(total)}tr`;
}

function renderDetailNote(item){
  document.getElementById('d-note-input').value=item.note||'';
  document.getElementById('d-note-edit').style.display='none';
  const c=document.getElementById('d-note-content');
  if(item.note&&item.note.trim()){
    c.innerHTML=`<div class="note-text">${item.note.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`;
  }else{
    c.innerHTML='<div class="note-empty">Chưa có ghi chú. Bấm "Sửa" để thêm.</div>';
  }
}

function renderDetailPayments(item){
  const el=document.getElementById('d-payments');
  const pays=(item.payments||[]).slice().reverse();
  if(!pays.length){el.innerHTML='<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px;">Chưa có thanh toán nào</div>';return;}
  el.innerHTML=pays.map(p=>`
    <div class="pay-item">
      <div><div class="pay-date">${p.date||'—'}</div>${p.note?`<div class="pay-note-text">${p.note}</div>`:''}</div>
      <div style="display:flex;align-items:center;">
        <div class="pay-amount">+${fmt(p.amount)}tr</div>
        <button class="pay-del" onclick="delPayment(${p.id})">×</button>
      </div>
    </div>`).join('');
}

window.toggleEditNote = function(){
  const ed=document.getElementById('d-note-edit');
  ed.style.display=ed.style.display==='none'?'block':'none';
  if(ed.style.display==='block')document.getElementById('d-note-input').focus();
}

window.saveNote = async function(){
  const arr=curType==='borrower'?borrowers:lenders;
  const item=arr.find(x=>x.id===curId);
  if(!item)return;
  const note=document.getElementById('d-note-input').value.trim();
  setSyncing(true);
  try{
    await updateDoc(doc(db,curType==='borrower'?'borrowers':'lenders',curId),{note});
    item.note=note;renderDetailNote(item);showToast('✓ Đã lưu ghi chú');
  }catch(e){showToast('❌ Lỗi lưu!');}
  setSyncing(false);
}

window.addPayment = async function(){
  const amount=parseFloat(document.getElementById('pay-amount').value)||0;
  if(amount<=0){showToast('Nhập số tiền!');return;}
  const date=document.getElementById('pay-date').value;
  const note=document.getElementById('pay-note').value.trim();
  const arr=curType==='borrower'?borrowers:lenders;
  const item=arr.find(x=>x.id===curId);
  if(!item)return;
  const payments=[...(item.payments||[]),{id:Date.now(),amount,date,note}];
  setSyncing(true);
  try{
    await updateDoc(doc(db,curType==='borrower'?'borrowers':'lenders',curId),{payments});
    item.payments=payments;
    document.getElementById('pay-amount').value='';document.getElementById('pay-note').value='';
    renderDetailProgress(item);renderDetailPayments(item);
    showToast('✓ Đã ghi nhận thanh toán');
  }catch(e){showToast('❌ Lỗi lưu!');}
  setSyncing(false);
}

window.delPayment = async function(pid){
  if(!confirm('Xoá thanh toán này?'))return;
  const arr=curType==='borrower'?borrowers:lenders;
  const item=arr.find(x=>x.id===curId);
  if(!item)return;
  const payments=(item.payments||[]).filter(p=>p.id!==pid);
  setSyncing(true);
  try{
    await updateDoc(doc(db,curType==='borrower'?'borrowers':'lenders',curId),{payments});
    item.payments=payments;renderDetailProgress(item);renderDetailPayments(item);
  }catch(e){showToast('❌ Lỗi!');}
  setSyncing(false);
}

async function deletePerson(id,type){
  if(!confirm('Xoá người này?'))return;
  setSyncing(true);
  try{
    await deleteDoc(doc(db,type==='borrower'?'borrowers':'lenders',id));
    showToast('✓ Đã xoá');closeDetail();
  }catch(e){showToast('❌ Lỗi xoá!');}
  setSyncing(false);
}

window.closeDetail = function(){
  document.getElementById('detail-page').classList.remove('open');
  curId=null;curType=null;
}

window.switchTab = function(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

['c-p','c-i','c-m','c-u'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('input',calcLite);
});
</script>
